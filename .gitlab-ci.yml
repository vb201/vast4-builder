stages:
  - build
  - publish

# workflow:
#   rules:
#     - if: '$CI_COMMIT_TAG'
#     - when: never

build:
  stage: build
  image: node:20-alpine
  # rules:
  #   - if: '$CI_COMMIT_TAG'
  script:
    - echo "Building the package"
    - npm install
    - npm run build  # or your specific build command
  artifacts:
    paths:
      - dist/         # adjust depending on your build output
    expire_in: 1 hour

publish:npm:
  stage: publish
  image: node:20-alpine
  # rules:
  #   - if: '$CI_COMMIT_TAG'
  needs:
    - job: build
      artifacts: true
  script:
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" > .npmrc
    - npm config set registry "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/"
    - echo "Publishing package from dist/"
    - npm publish --ignore-scripts --access public || npm publish --ignore-scripts
